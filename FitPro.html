<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#F5F0E8"/>
<title>Forma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#F5F0E8;font-family:'DM Sans',sans-serif;color:#1C1917;overscroll-behavior:none;padding-bottom:80px;}
input,button,select{font-family:'DM Sans',sans-serif;}
input::placeholder{color:#A8A29E;}
select{-webkit-appearance:none;appearance:none;}
.card{background:#FDFAF4;border:1px solid rgba(28,25,23,.10);border-radius:20px;padding:16px;}
.lbl{font-size:11px;font-weight:700;letter-spacing:1.2px;color:#A8A29E;text-transform:uppercase;margin-bottom:8px;}
.inp{width:100%;background:#EDEAE0;border:1.5px solid rgba(28,25,23,.18);border-radius:12px;padding:12px 14px;color:#1C1917;font-size:14px;outline:none;}
.inp:focus{border-color:#C84B31;}
.btn-main{width:100%;padding:15px;border-radius:14px;border:none;background:#1C1917;color:#FDFAF4;font-size:14px;font-weight:700;cursor:pointer;}
.btn-chip{padding:6px 14px;border-radius:99px;border:1.5px solid rgba(28,25,23,.10);background:transparent;color:#78716C;font-size:12px;font-weight:600;cursor:pointer;}
.btn-chip.on{border-color:#C84B31;background:#C84B31;color:#FDFAF4;}
.btn-chip.teal{border-color:#2A6B6E;background:#2A6B6E;color:#FDFAF4;}
.modal-overlay{position:fixed;inset:0;background:rgba(28,25,23,.55);z-index:100;display:flex;flex-direction:column;}
.modal-sheet{position:relative;margin-top:auto;background:#F5F0E8;border-radius:24px 24px 0 0;max-height:88vh;overflow-y:auto;z-index:1;}
.modal-handle{text-align:center;padding:12px 0 4px;}
.modal-handle div{width:36px;height:4px;border-radius:2px;background:rgba(28,25,23,.10);display:inline-block;}
.tab-btn{flex:1;padding:11px 4px;background:none;border:none;border-bottom:2.5px solid transparent;color:#78716C;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;}
.tab-btn.active{border-bottom-color:#C84B31;color:#C84B31;}
.sub-tab{flex:1;padding:11px 4px;background:none;border:none;border-bottom:2.5px solid transparent;color:#78716C;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;}
.sub-tab.active{border-bottom-color:#2A6B6E;color:#2A6B6E;}
.seg-wrap{display:flex;background:#EDEAE0;border-radius:12px;padding:3px;border:1px solid rgba(28,25,23,.10);}
.seg-btn{flex:1;padding:10px 4px;border-radius:9px;border:none;background:transparent;color:#78716C;font-size:12px;font-weight:500;cursor:pointer;}
.seg-btn.active{background:#FDFAF4;color:#1C1917;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.ex-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr 36px;gap:4px;padding:7px 12px;align-items:center;border-bottom:1px solid rgba(28,25,23,.06);}
.ex-row.done{background:rgba(42,107,110,0.06);}
.ex-input{background:#EDEAE0;border:1px solid rgba(28,25,23,.18);border-radius:8px;padding:7px 4px;color:#1C1917;font-size:14px;text-align:center;width:100%;outline:none;}
.ex-input.done{background:rgba(42,107,110,0.08);border-color:#2A6B6E;}
.check-btn{width:34px;height:34px;border-radius:10px;border:2px solid rgba(28,25,23,.18);background:transparent;color:#A8A29E;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.check-btn.done{border-color:#2A6B6E;background:#2A6B6E;color:white;font-size:14px;}
.device-card{background:#FDFAF4;border:1.5px solid rgba(28,25,23,.10);border-radius:18px;overflow:hidden;margin-bottom:10px;transition:border .2s;}
.progress-bar{height:3px;background:#EDEAE0;border-radius:2px;}
.progress-fill{height:100%;border-radius:2px;transition:width .5s;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.pulse{animation:pulse 2s infinite;}
.arc-wrap{position:relative;display:inline-block;}
.arc-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hidden{display:none!important;}
.water-bar{flex:1;height:7px;border-radius:3px;background:#EDEAE0;cursor:pointer;transition:background .2s;}
.water-bar.fill{background:#60A5FA;}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="header" style="background:#FDFAF4;border-bottom:1px solid rgba(28,25,23,.10);position:sticky;top:0;z-index:50;">
  <div style="padding:18px 18px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div>
      <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:-.5px;">Forma</div>
      <div id="header-sub" style="font-size:10px;color:#A8A29E;letter-spacing:2px;text-transform:uppercase;margin-top:1px;">Tu salud, tu ritmo</div>
    </div>
    <button onclick="setTab('devices')" id="wearable-btn" style="display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:99px;border:1.5px solid rgba(28,25,23,.10);background:transparent;color:#78716C;font-size:11px;font-weight:700;cursor:pointer;">&#x2295; Wearables</button>
  </div>
  <div style="display:flex;overflow-x:auto;">
    <button class="tab-btn active" onclick="setTab('perfil')" id="t-perfil">Perfil</button>
    <button class="tab-btn" onclick="setTab('nutricion')" id="t-nutricion">Nutrici&#xF3;n</button>
    <button class="tab-btn" onclick="setTab('entreno')" id="t-entreno">Entreno</button>
    <button class="tab-btn" onclick="setTab('devices')" id="t-devices">Devices</button>
    <button class="tab-btn" onclick="setTab('plan')" id="t-plan">Mi Plan</button>
  </div>
</div>

<!-- PAGES -->
<div id="page-perfil" class="page" style="padding:20px 18px;">
  <div id="tdee-cards" class="hidden" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
    <div class="card" style="text-align:center;">
      <div id="tdee-val" style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#C84B31;">—</div>
      <div style="font-size:10px;color:#A8A29E;margin-top:3px;letter-spacing:1px;text-transform:uppercase;">TDEE</div>
    </div>
    <div class="card" style="text-align:center;">
      <div id="meta-val" style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#2A6B6E;">—</div>
      <div style="font-size:10px;color:#A8A29E;margin-top:3px;letter-spacing:1px;text-transform:uppercase;">Meta kcal</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:15px;">
    <div><div class="lbl">Nombre</div><input class="inp" id="p-nombre" placeholder="&#xBF;C&#xF3;mo te llamas?" oninput="updateHeader()"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      <div><div class="lbl">Edad</div><input class="inp" id="p-edad" type="number" value="28" style="text-align:center;"/></div>
      <div><div class="lbl">Peso kg</div><input class="inp" id="p-peso" type="number" value="70" style="text-align:center;"/></div>
      <div><div class="lbl">Altura cm</div><input class="inp" id="p-altura" type="number" value="170" style="text-align:center;"/></div>
    </div>
    <div>
      <div class="lbl">Sexo biol&#xF3;gico</div>
      <div class="seg-wrap">
        <button class="seg-btn active" id="sex-m" onclick="setSex('m')">Masculino</button>
        <button class="seg-btn" id="sex-f" onclick="setSex('f')">Femenino</button>
      </div>
    </div>
    <div>
      <div class="lbl">Actividad</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;" id="act-chips">
        <button class="btn-chip" onclick="setAct('sed')">Sedentario</button>
        <button class="btn-chip" onclick="setAct('light')">Ligero</button>
        <button class="btn-chip on" onclick="setAct('mod')">Moderado</button>
        <button class="btn-chip" onclick="setAct('active')">Activo</button>
        <button class="btn-chip" onclick="setAct('vactive')">Muy activo</button>
      </div>
    </div>
    <div>
      <div class="lbl">Objetivo</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
        <button onclick="setGoal('lose')" id="g-lose" style="padding:14px 8px;border-radius:14px;border:2px solid rgba(28,25,23,.10);background:#FDFAF4;color:#78716C;cursor:pointer;font-size:12px;font-weight:700;text-align:center;">
          <div style="font-size:18px;margin-bottom:4px;">&#x1F53B;</div>Perder
        </button>
        <button onclick="setGoal('keep')" id="g-keep" style="padding:14px 8px;border-radius:14px;border:2px solid #C84B31;background:#C84B31;color:#FDFAF4;cursor:pointer;font-size:12px;font-weight:700;text-align:center;">
          <div style="font-size:18px;margin-bottom:4px;">&#x2501;</div>Mantener
        </button>
        <button onclick="setGoal('gain')" id="g-gain" style="padding:14px 8px;border-radius:14px;border:2px solid rgba(28,25,23,.10);background:#FDFAF4;color:#78716C;cursor:pointer;font-size:12px;font-weight:700;text-align:center;">
          <div style="font-size:18px;margin-bottom:4px;">&#x25B2;</div>M&#xFA;sculo
        </button>
      </div>
    </div>
    <div>
      <div class="lbl">Restricciones</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;" id="rest-chips">
        <button class="btn-chip" onclick="toggleRest(this,'Vegetariano')">Vegetariano</button>
        <button class="btn-chip" onclick="toggleRest(this,'Vegano')">Vegano</button>
        <button class="btn-chip" onclick="toggleRest(this,'Sin gluten')">Sin gluten</button>
        <button class="btn-chip" onclick="toggleRest(this,'Sin lactosa')">Sin lactosa</button>
        <button class="btn-chip" onclick="toggleRest(this,'Sin mariscos')">Sin mariscos</button>
      </div>
    </div>
    <button class="btn-main" onclick="saveProfile()">Guardar perfil</button>
  </div>
</div>

<div id="page-nutricion" class="page hidden" style="padding:0 18px 20px;">
  <!-- Summary ring -->
  <div class="card" style="display:flex;align-items:center;gap:16px;margin-bottom:14px;margin-top:16px;">
    <div class="arc-wrap" style="flex-shrink:0;">
      <svg id="nut-arc" width="100" height="100">
        <circle cx="50" cy="50" r="41" fill="none" stroke="rgba(28,25,23,.10)" stroke-width="8"/>
        <circle id="nut-arc-fill" cx="50" cy="50" r="41" fill="none" stroke="#2A6B6E" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="0 257.6" transform="rotate(-90 50 50)" style="transition:stroke-dasharray .6s ease;"/>
      </svg>
      <div class="arc-center">
        <div id="nut-kcal" style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1;">0</div>
        <div style="font-size:9px;color:#A8A29E;letter-spacing:1px;margin-top:2px;">KCAL</div>
      </div>
    </div>
    <div style="flex:1;">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:12px;color:#78716C;">Meta</span><span id="nut-meta-lbl" style="font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#A8A29E;">2000 kcal</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span style="font-size:12px;color:#78716C;">Consumidas</span><span id="nut-in" style="font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#1C1917;">0 kcal</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="font-size:12px;color:#78716C;">Restantes</span><span id="nut-left" style="font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#2A6B6E;">2000 kcal</span></div>
    </div>
  </div>
  <!-- Macros -->
  <div class="card" style="margin-bottom:14px;">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;">
      <div style="text-align:center;">
        <div id="m-p" style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#C84B31;">0<span style="font-size:9px;font-weight:400;">g</span></div>
        <div style="font-size:9px;color:#A8A29E;margin-bottom:5px;text-transform:uppercase;">Prot</div>
        <div class="progress-bar"><div id="m-p-bar" class="progress-fill" style="width:0%;background:#C84B31;"></div></div>
      </div>
      <div style="text-align:center;">
        <div id="m-c" style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#2A6B6E;">0<span style="font-size:9px;font-weight:400;">g</span></div>
        <div style="font-size:9px;color:#A8A29E;margin-bottom:5px;text-transform:uppercase;">Carbs</div>
        <div class="progress-bar"><div id="m-c-bar" class="progress-fill" style="width:0%;background:#2A6B6E;"></div></div>
      </div>
      <div style="text-align:center;">
        <div id="m-f" style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#B5851B;">0<span style="font-size:9px;font-weight:400;">g</span></div>
        <div style="font-size:9px;color:#A8A29E;margin-bottom:5px;text-transform:uppercase;">Grasa</div>
        <div class="progress-bar"><div id="m-f-bar" class="progress-fill" style="width:0%;background:#B5851B;"></div></div>
      </div>
      <div style="text-align:center;">
        <div id="m-fi" style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#6B7280;">0<span style="font-size:9px;font-weight:400;">g</span></div>
        <div style="font-size:9px;color:#A8A29E;margin-bottom:5px;text-transform:uppercase;">Fibra</div>
        <div class="progress-bar"><div id="m-fi-bar" class="progress-fill" style="width:0%;background:#6B7280;"></div></div>
      </div>
    </div>
  </div>
  <!-- Water -->
  <div class="card" style="margin-bottom:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div>
        <div style="font-weight:700;font-size:13px;">&#x1F4A7; Agua</div>
        <div id="water-lbl" style="font-size:11px;color:#A8A29E;margin-top:1px;">4/8 vasos</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button onclick="changeWater(-1)" style="width:30px;height:30px;border-radius:99px;border:1px solid rgba(28,25,23,.10);background:transparent;color:#78716C;cursor:pointer;font-size:16px;">&#x2212;</button>
        <button onclick="changeWater(1)" style="width:30px;height:30px;border-radius:99px;border:none;background:#2A6B6E;color:white;cursor:pointer;font-size:16px;">+</button>
      </div>
    </div>
    <div id="water-bars" style="display:flex;gap:4px;"></div>
  </div>
  <!-- Meals -->
  <div id="meals-container"></div>
</div>

<div id="page-entreno" class="page hidden">
  <div style="display:flex;border-bottom:1px solid rgba(28,25,23,.10);background:#FDFAF4;">
    <button class="sub-tab active" onclick="setWorkoutView('hoy')" id="wt-hoy">Hoy</button>
    <button class="sub-tab" onclick="setWorkoutView('rutinas')" id="wt-rutinas">Rutinas</button>
    <button class="sub-tab" onclick="setWorkoutView('progreso')" id="wt-progreso">Progreso</button>
  </div>
  <div id="wv-hoy" style="padding:16px 18px 0;"></div>
  <div id="wv-rutinas" class="hidden" style="padding:0 18px;"></div>
  <div id="wv-progreso" class="hidden" style="padding:0 18px;"></div>
</div>

<div id="page-devices" class="page hidden" style="padding:20px 18px;"></div>
<div id="page-plan" class="page hidden" style="padding:20px 18px;"></div>

<!-- Food Modal -->
<div id="food-modal" class="modal-overlay hidden">
  <div style="position:absolute;inset:0;" onclick="closeFoodModal()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"><div></div></div>
    <div style="padding:12px 16px 32px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div id="food-modal-title" style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;"></div>
        <button onclick="closeFoodModal()" style="background:none;border:none;font-size:22px;color:#A8A29E;cursor:pointer;">&#xD7;</button>
      </div>
      <input class="inp" id="food-search" placeholder="Buscar alimento&#x2026;" oninput="searchFood()" style="margin-bottom:12px;"/>
      <div id="food-selected" class="hidden"></div>
      <div id="food-results"></div>
    </div>
  </div>
</div>

<!-- Exercise Modal -->
<div id="ex-modal" class="modal-overlay hidden">
  <div style="position:absolute;inset:0;" onclick="closeExModal()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"><div></div></div>
    <div style="padding:14px 16px;">
      <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:12px;">A&#xF1;adir ejercicio</div>
      <input class="inp" id="ex-search" placeholder="Buscar&#x2026;" oninput="filterExercises()" style="margin-bottom:10px;"/>
      <div id="ex-muscle-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;"></div>
      <div id="ex-list"></div>
      <div style="height:20px;"></div>
    </div>
  </div>
</div>

<!-- Device Detail Modal -->
<div id="dev-modal" class="modal-overlay hidden">
  <div style="position:absolute;inset:0;" onclick="closeDevModal()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"><div></div></div>
    <div id="dev-modal-content" style="padding:14px 18px 32px;"></div>
  </div>
</div>

<!-- Rest Timer Modal -->
<div id="timer-modal" class="modal-overlay hidden">
  <div style="position:absolute;inset:0;" onclick="closeTimer()"></div>
  <div class="modal-sheet" style="padding:20px;">
    <div class="modal-handle"><div></div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px 0;">
      <div class="arc-wrap">
        <svg id="timer-arc" width="110" height="110">
          <circle cx="55" cy="55" r="46" fill="none" stroke="rgba(28,25,23,.10)" stroke-width="8"/>
          <circle id="timer-fill" cx="55" cy="55" r="46" fill="none" stroke="#2A6B6E" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="0 289" transform="rotate(-90 55 55)" style="transition:stroke-dasharray .5s;"/>
        </svg>
        <div class="arc-center">
          <div id="timer-display" style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;">1:30</div>
          <div style="font-size:9px;color:#A8A29E;letter-spacing:1px;">DESCANSO</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="adjTimer(-15)" style="padding:7px 12px;border-radius:99px;border:1px solid rgba(28,25,23,.10);background:transparent;color:#78716C;font-size:12px;cursor:pointer;">-15s</button>
        <button onclick="adjTimer(-30)" style="padding:7px 12px;border-radius:99px;border:1px solid rgba(28,25,23,.10);background:transparent;color:#78716C;font-size:12px;cursor:pointer;">-30s</button>
        <button onclick="adjTimer(30)" style="padding:7px 12px;border-radius:99px;border:1px solid rgba(28,25,23,.10);background:transparent;color:#78716C;font-size:12px;cursor:pointer;">+30s</button>
        <button onclick="closeTimer()" style="padding:7px 14px;border-radius:99px;border:none;background:#2A6B6E;color:white;font-size:12px;cursor:pointer;font-weight:700;">Saltar</button>
      </div>
    </div>
  </div>
</div>

</div><!-- #app -->

<script>
// ============================================================
// DATA
// ============================================================
var STATE = {
  sex:'m', act:'mod', goal:'keep', restrictions:[],
  profileSaved: false,
  water: 4,
  diary: {Desayuno:[],Almuerzo:[],Cena:[],Snack:[]},
  session: [],
  activeRoutine: null,
  connectedDevices: {},
  timerSecs: 90,
  timerInterval: null,
  foodModalMeal: null,
  exMuscleFil: 'Todo',
  workoutView: 'hoy',
  aiPlan: null,
};

var FOODS = [
  {id:1,n:'Pechuga de pollo',s:'100g',cal:165,p:31,c:0,f:3.6,fi:0},
  {id:2,n:'Arroz blanco',s:'100g',cal:130,p:2.7,c:28,f:0.3,fi:0.4},
  {id:3,n:'Huevo entero',s:'1 ud',cal:72,p:6.3,c:0.4,f:5,fi:0},
  {id:4,n:'Avena',s:'100g',cal:389,p:17,c:66,f:7,fi:10},
  {id:5,n:'Pl\u00e1tano',s:'1 med',cal:89,p:1.1,c:23,f:0.3,fi:2.6},
  {id:6,n:'Salm\u00f3n',s:'100g',cal:208,p:20,c:0,f:13,fi:0},
  {id:7,n:'Br\u00f3coli',s:'100g',cal:34,p:2.8,c:7,f:0.4,fi:2.6},
  {id:8,n:'Aguacate',s:'100g',cal:160,p:2,c:9,f:15,fi:6.7},
  {id:9,n:'Leche entera',s:'200ml',cal:122,p:6.4,c:9.6,f:6.6,fi:0},
  {id:10,n:'Pan integral',s:'1 reb',cal:80,p:4,c:15,f:1,fi:2},
  {id:11,n:'At\u00fan en lata',s:'100g',cal:116,p:26,c:0,f:1,fi:0},

function calcTDEE(p,h,a,sex,act){
  var bmr = sex==='m' ? 10*p+6.25*h-5*a+5 : 10*p+6.25*h-5*a-161;
  var f = {sed:1.2,light:1.375,mod:1.55,active:1.725,vactive:1.9};
  return Math.round(bmr*(f[act]||1.55));
}
function calcMeta(t,g){ return g==='lose'?t-500:g==='gain'?t+300:t; }
function orm(w,r){ return r===1?w:Math.round(w/(1.0278-0.0278*r)); }
function fmtTime(s){ return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }
function getMeta(){
  var p=parseFloat(document.getElementById('p-peso').value)||70;
  var h=parseFloat(document.getElementById('p-altura').value)||170;
  var a=parseFloat(document.getElementById('p-edad').value)||28;
  return calcMeta(calcTDEE(p,h,a,STATE.sex,STATE.act),STATE.goal);
}
function el(id){ return document.getElementById(id); }
function show(id){ var e=el(id); if(e){e.classList.remove('hidden');} }
function hide(id){ var e=el(id); if(e){e.classList.add('hidden');} }

}

function updateNutritionTotals(){
  var meta=getMeta();
  var all=[];
  Object.keys(STATE.diary).forEach(function(m){STATE.diary[m].forEach(function(e){all.push(e);});});
  var cal=all.reduce(function(s,e){return s+e.cal;},0);
  var p=all.reduce(function(s,e){return s+e.p;},0);
  var c=all.reduce(function(s,e){return s+e.c;},0);
  var f=all.reduce(function(s,e){return s+e.f;},0);
  var fi=all.reduce(function(s,e){return s+(e.fi||0);},0);
  var pct=meta>0?Math.min((cal/meta)*100,130):0;
  var circ=257.6;
  el('nut-arc-fill').setAttribute('stroke-dasharray',(pct/100*circ)+' '+circ);
  el('nut-arc-fill').setAttribute('stroke',pct>100?'#C84B31':'#2A6B6E');
  el('nut-kcal').textContent=cal;
  el('nut-in').textContent=cal+' kcal';
  var left=meta-cal;
  el('nut-left').textContent=left+' kcal';
  el('nut-left').style.color=left<0?'#C84B31':'#2A6B6E';
  var rp=Math.round(meta*0.30/4)||60;
  var rc=Math.round(meta*0.45/4)||100;
  var rf=Math.round(meta*0.25/9)||40;
  el('m-p').innerHTML=Math.round(p)+'<span style="font-size:9px;font-weight:400;">g</span>';
  el('m-c').innerHTML=Math.round(c)+'<span style="font-size:9px;font-weight:400;">g</span>';
  el('m-f').innerHTML=Math.round(f)+'<span style="font-size:9px;font-weight:400;">g</span>';
  el('m-fi').innerHTML=Math.round(fi)+'<span style="font-size:9px;font-weight:400;">g</span>';
  el('m-p-bar').style.width=Math.min((p/rp)*100,100)+'%';
  el('m-c-bar').style.width=Math.min((c/rc)*100,100)+'%';
  el('m-f-bar').style.width=Math.min((f/rf)*100,100)+'%';
  el('m-fi-bar').style.width=Math.min((fi/25)*100,100)+'%';
}

function renderWorkoutHoy(){
  var d=el('wv-hoy');d.innerHTML='';
  var sess=STATE.session;
  if(sess.length>0){
    var done=sess.reduce(function(a,s){return a+s.sets.filter(function(st){return st.done;}).length;},0);
    var total=sess.reduce(function(a,s){return a+s.sets.length;},0);
    var pct=total>0?((done/total)*100):0;
    var headerDiv=document.createElement('div');
    headerDiv.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;';
    headerDiv.innerHTML='<div>'+
      '<div style="font-family:\'Playfair Display\',serif;font-size:17px;font-weight:700;">'+(STATE.activeRoutine?STATE.activeRoutine.name:'Entreno libre')+'</div>'+
      '<div style="font-size:12px;color:#78716C;margin-top:1px;">'+done+'/'+total+' series</div></div>'+
      '<button onclick="endSession()" style="padding:7px 14px;border-radius:99px;border:1px solid rgba(28,25,23,.10);background:transparent;color:#78716C;font-size:12px;cursor:pointer;font-family:\'DM Sans\',sans-serif;">Finalizar</button>';
    d.appendChild(headerDiv);
    if(total>0){
      var pb=document.createElement('div');
      pb.className='progress-bar';pb.style.marginBottom='14px';
      pb.innerHTML='<div class="progress-fill" style="width:'+pct+'%;background:#2A6B6E;transition:width .3s;"></div>';
      d.appendChild(pb);
    }
  }
  sess.forEach(function(s,si){
    var ex=EXERCISES.find(function(e){return e.id===s.id;});

// Rest Timer
function openTimer(){
  STATE.timerSecs=90;
  updateTimerDisplay();
  show('timer-modal');
  clearInterval(STATE.timerInterval);
  STATE.timerInterval=setInterval(function(){
    if(STATE.timerSecs>0){STATE.timerSecs--;updateTimerDisplay();}
    else{closeTimer();}
  },1000);
}
function closeTimer(){clearInterval(STATE.timerInterval);hide('timer-modal');}
function adjTimer(d){STATE.timerSecs=Math.max(0,STATE.timerSecs+d);updateTimerDisplay();}
function updateTimerDisplay(){
  var s=STATE.timerSecs;
  el('timer-display').textContent=fmtTime(s);
  var pct=((90-s)/90)*100;
  var circ=289;
  el('timer-fill').setAttribute('stroke-dasharray',(pct/100*circ)+' '+circ);
  el('timer-fill').setAttribute('stroke',s>30?'#2A6B6E':'#C84B31');
}

    rows.map(function(r){return'<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(28,25,23,.10);">'+
      '<span style="font-size:12px;color:#78716C;">'+r[0]+'</span>'+
      '<span style="font-family:\'Playfair Display\',serif;font-size:16px;font-weight:700;">'+r[1]+'</span></div>';}).join('')+
    '<div style="height:20px;"></div>';
  show('dev-modal');
}
function closeDevModal(){hide('dev-modal');}

function updateWearableBtn(){
  var n=Object.values(STATE.connectedDevices).filter(Boolean).length;
  var btn=el('wearable-btn');
  if(n>0){
    btn.style.borderColor='#2A6B6E';btn.style.background='#B0D4D6';btn.style.color='#2A6B6E';
    btn.innerHTML='<div style="width:6px;height:6px;border-radius:3px;background:#2A6B6E;animation:pulse 2s infinite;display:inline-block;margin-right:4px;"></div>'+n+' activo'+(n>1?'s':'');
  } else {
    btn.style.borderColor='rgba(28,25,23,.10)';btn.style.background='transparent';btn.style.color='#78716C';
    btn.innerHTML='&#x2295; Wearables';
  }
}

function renderPlan(){
  var d=el('page-plan');
  var meta=getMeta();
  var goalTxt=STATE.goal==='lose'?'perder peso':STATE.goal==='gain'?'ganar m\u00fasculo':'mantener peso';
  var nConn=Object.values(STATE.connectedDevices).filter(Boolean).length;
  var savedInfo=STATE.profileSaved?meta+' kcal/d\u00eda \u00b7 '+goalTxt+(nConn>0?' \u00b7 '+nConn+' wearable'+(nConn>1?'s':''):''):'Completa tu perfil primero';
  d.innerHTML='<div style="font-family:\'Playfair Display\',serif;font-size:22px;font-weight:700;margin-bottom:4px;">Plan a medida</div>'+
    '<div style="font-size:13px;color:#78716C;margin-bottom:18px;line-height:1.6;">'+savedInfo+'</div>'+
    (!STATE.profileSaved?'<div style="padding:13px 14px;background:#F0D9A0;border:1px solid #B5851B;border-radius:14px;margin-bottom:16px;font-size:13px;color:#B5851B;font-weight:600;">\u26A0\uFE0F Guarda tu perfil primero</div>':'')+
    '<button id="gen-btn" onclick="generatePlan()" '+(STATE.profileSaved?'':'disabled')+' style="width:100%;padding:15px;border-radius:14px;border:none;background:'+(STATE.profileSaved?'#1C1917':'#EDEAE0')+';color:'+(STATE.profileSaved?'#FDFAF4':'#A8A29E')+';font-size:14px;font-weight:700;cursor:'+(STATE.profileSaved?'pointer':'not-allowed')+';font-family:\'DM Sans\',sans-serif;margin-bottom:20px;">Generar plan semanal con IA</button>'+
    '<div id="plan-content"></div>';
  if(STATE.aiPlan) renderPlanContent(STATE.aiPlan);
}

async function generatePlan(){
  var btn=el('gen-btn');
  btn.textContent='Generando\u2026';btn.disabled=true;
  el('plan-content').innerHTML='<div style="text-align:center;padding:40px 0;"><div style="font-family:\'Playfair Display\',serif;font-size:38px;opacity:.3;">&#x25CE;</div><div style="font-size:13px;color:#A8A29E;margin-top:10px;">Analizando perfil y wearables&#x2026;</div></div>';
  var meta=getMeta();
  var nombre=el('p-nombre').value||'Usuario';
  var edad=el('p-edad').value||28;
  var peso=el('p-peso').value||70;
  var altura=el('p-altura').value||170;
  var sexo=STATE.sex==='m'?'masculino':'femenino';
  var goalTxt=STATE.goal==='lose'?'perder peso':STATE.goal==='gain'?'ganar musculo':'mantener peso';
  var devs=DEVICES.filter(function(d){return STATE.connectedDevices[d.id];}).map(function(d){return d.name;}).join(', ')||'ninguno';
  var rest=STATE.restrictions.length?'Restricciones: '+STATE.restrictions.join(', ')+'.':' ';
  var prompt='Eres nutricionista y entrenador personal. Devuelve SOLO JSON valido, sin texto extra, solo el JSON: ' +
    '{"resumen":"2 oraciones",' +
    '"menu_semanal":{' +
    '"lunes":{"desayuno":"x","almuerzo":"x","cena":"x","snack":"x","calorias_aprox":0},' +
    '"martes":{"desayuno":"x","almuerzo":"x","cena":"x","snack":"x","calorias_aprox":0},' +
    '"miercoles":{"desayuno":"x","almuerzo":"x","cena":"x","snack":"x","calorias_aprox":0},' +
    '"jueves":{"desayuno":"x","almuerzo":"x","cena":"x","snack":"x","calorias_aprox":0},' +
    '"viernes":{"desayuno":"x","almuerzo":"x","cena":"x","snack":"x","calorias_aprox":0},' +
    '"sabado":{"desayuno":"x","almuerzo":"x","cena":"x","snack":"x","calorias_aprox":0},' +
    '"domingo":{"desayuno":"x","almuerzo":"x","cena":"x","snack":"x","calorias_aprox":0}},' +
    '"plan_ejercicios":[{"dia":"x","tipo":"x","ejercicios":["x"],"duracion_min":0,"notas":"x"}],' +
    '"consejos":["x","x","x"]} ' +
    'Perfil: '+nombre+', '+edad+'a, '+peso+'kg, '+altura+'cm, '+sexo+', objetivo: '+goalTxt+', meta: '+meta+' kcal. '+rest+' Wearables: '+devs+'.';

  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    var data=await res.json();
    var txt=(data.content||[]).map(function(b){return b.text||'';}).join('');
    var match=txt.match(/{[\s\S]*}/);
    var plan=JSON.parse(match?match[0]:txt);
    STATE.aiPlan=plan;
    renderPlanContent(plan);
  }catch(e){
    el('plan-content').innerHTML='<div style="padding:14px;background:#F4B8A8;border-radius:14px;color:#9A3520;text-align:center;font-size:13px;font-weight:600;">Error generando el plan. Int\u00e9ntalo de nuevo.</div>';
  }
  btn.textContent='Generar plan semanal con IA';btn.disabled=false;
}

function renderPlanContent(plan){
  var DIAS_ES=['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
  var DIAS_F=['Lunes','Martes','Mi\u00e9rcoles','Jueves','Viernes','S\u00e1bado','Domingo'];
  var d=el('plan-content');
  var html='<div style="background:#FDFAF4;border:1px solid rgba(28,25,23,.10);border-radius:16px;padding:16px;margin-bottom:16px;border-left:4px solid #C84B31;">'+
    '<div class="lbl">Resumen</div><p style="font-size:13px;color:#78716C;line-height:1.7;margin:0;">'+plan.resumen+'</p></div>';
  html+='<div style="font-family:\'Playfair Display\',serif;font-size:19px;font-weight:700;margin-bottom:12px;">Men\u00fa semanal</div>';
  DIAS_ES.forEach(function(day,di){
    var m=plan.menu_semanal&&plan.menu_semanal[day];
    if(!m) return;
    html+='<details style="margin-bottom:7px;border:1px solid rgba(28,25,23,.10);border-radius:14px;overflow:hidden;background:#FDFAF4;">'+
      '<summary style="padding:13px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;list-style:none;font-family:\'DM Sans\',sans-serif;">'+
      '<span style="font-weight:700;font-size:14px;">'+DIAS_F[di]+'</span>'+
      '<span style="font-size:12px;color:#C84B31;font-weight:600;">~'+m.calorias_aprox+' kcal</span></summary>'+
      '<div style="padding:0 14px 12px;border-top:1px solid rgba(28,25,23,.10);">'+
      ['desayuno','almuerzo','cena','snack'].filter(function(meal){return m[meal];}).map(function(meal){
        return'<div style="display:flex;gap:10px;margin-top:10px;align-items:flex-start;">'+
          '<div style="width:3px;background:#F4B8A8;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:28px;"></div>'+
          '<div><div style="font-size:9px;font-weight:700;color:#C84B31;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;">'+meal+'</div>'+
          '<div style="font-size:13px;color:#78716C;line-height:1.5;">'+m[meal]+'</div></div></div>';
      }).join('')+'</div></details>';
  });
  if(plan.plan_ejercicios){
    html+='<div style="font-family:\'Playfair Display\',serif;font-size:19px;font-weight:700;margin:16px 0 12px;">Plan de entreno</div>';
    plan.plan_ejercicios.forEach(function(p){
      html+='<div style="background:#FDFAF4;border:1px solid rgba(28,25,23,.10);border-radius:14px;padding:14px;margin-bottom:8px;border-left:4px solid #2A6B6E;">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'+
        '<span style="font-weight:700;font-size:14px;">'+p.dia+'</span>'+
        '<span style="font-size:11px;background:#B0D4D6;color:#2A6B6E;padding:3px 10px;border-radius:99px;font-weight:700;">'+p.tipo+' \u00b7 '+p.duracion_min+'min</span></div>'+
        (p.ejercicios||[]).map(function(e){return'<div style="font-size:12px;color:#78716C;padding:3px 0;border-bottom:1px dashed rgba(28,25,23,.10);">'+e+'</div>';}).join('')+
        (p.notas?'<div style="margin-top:7px;font-size:12px;color:#2A6B6E;font-style:italic;">\uD83D\uDCA1 '+p.notas+'</div>':'')+'</div>';
    });
  }
  if(plan.consejos){
    html+='<div style="background:#F0D9A0;border:1px solid #B5851B;border-radius:16px;padding:16px;margin-top:4px;">'+
      '<div class="lbl">Consejos</div>'+
      plan.consejos.map(function(c,i){return'<div style="display:flex;gap:10px;margin-bottom:7px;font-size:13px;color:#1C1917;line-height:1.5;"><span style="color:#B5851B;font-weight:700;flex-shrink:0;">0'+(i+1)+'</span>'+c+'</div>';}).join('')+'</div>';
  }
  d.innerHTML=html;
}
